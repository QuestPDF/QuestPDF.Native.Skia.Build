name: Build Skia + QuestPDF

permissions: {}

on:
  workflow_dispatch:

jobs:
  main:
    name: ${{ matrix.runtime.name }}
    runs-on: ${{ matrix.runtime.runs-on }}
    container: ${{ matrix.runtime.container }}
    timeout-minutes: 40
      
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        runtime: 
        - name: win-x64
          runs-on: windows-latest-xlarge
        - name: win-x86
          runs-on: windows-latest-xlarge
        - name: linux-x64
          runs-on: ubuntu-latest-xlarge
          container: quay.io/pypa/manylinux_2_28_x86_64
        - name: linux-arm64
          runs-on: ubuntu-latest-xlarge-arm64
          container: quay.io/pypa/manylinux_2_28_aarch64
        - name: linux-musl-x64
          runs-on: ubuntu-latest-xlarge
          container: alpine:3.17
        - name: osx-x64
          runs-on: macos-latest-large
        - name: osx-arm64
          runs-on: macos-latest-xlarge

    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true    
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4


      - name: Install Build Tools
        if: matrix.runtime.name == 'linux-x64' || matrix.runtime.name == 'linux-arm64'
        shell: bash
        run: |
          dnf update -y
          dnf install -y wget curl git cmake fontconfig tar xz gzip findutils which patch
          dnf install -y clang lldb lld libstdc++-devel make gcc gcc-c++ cmake

            
      - name: Install Build Tools (Alpine)
        if: matrix.runtime.name == 'linux-musl-x64'
        shell: sh
        run: |
          apk update
          apk upgrade
          apk add bash wget git python3 build-base cmake clang llvm15 icu-libs linux-headers bsd-compat-headers gn fontconfig font-noto tar xz

          
      - name: Install 3.x
        if: runner.os != 'Linux'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'


      - name: Install Skia Build System
        if: matrix.runtime.name != 'linux-musl-x64'
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git --single-branch --depth 1
          echo "${PWD}/depot_tools" >> $GITHUB_PATH
          export PATH="${PWD}/depot_tools:${PATH}"

          
      - name: Build Skia
        shell: bash
        run: |
          git clone https://github.com/QuestPDF/QuestPDF.Native.Skia --branch chrome/m148 --single-branch --depth 1 skia
          cd skia
          
          bin/fetch-ninja
          python3 tools/git-sync-deps
          COMMON_ARGS='
            is_official_build=true
            is_component_build=false
            is_debug=false
            skia_enable_optimize_size=true
            skia_enable_tools=true
            skia_use_system_expat=false
            skia_use_system_icu=false
            skia_use_system_harfbuzz=false
            skia_use_system_libjpeg_turbo=false
            skia_use_system_libpng=false
            skia_use_system_libwebp=false
            skia_use_system_zlib=false
            skia_use_system_freetype2=false
            skia_use_dng_sdk=false
            skia_use_harfbuzz=true
            skia_use_icu=false
            skia_use_icu4x=false
            skia_use_libgrapheme=true
            skia_use_fontconfig=false
            skia_use_gl=false
            skia_use_zlib=true
            skia_use_libjpeg_turbo_decode=true
            skia_use_libjpeg_turbo_encode=true
            skia_use_libpng_encode=true
            skia_use_libpng_decode=true
            skia_use_libwebp_encode=true
            skia_use_libwebp_decode=true
            skia_enable_android_utils=false
            skia_enable_spirv_validation=false
            skia_enable_gpu=false
            skia_enable_gpu_debug_layers=false
            skia_enable_fontmgr_custom_directory=true
            skia_use_freetype=true
            skia_use_jpeg_gainmaps=false
            skia_use_libheif=false
            skia_use_lua=false
            skia_enable_svg=true
            skia_use_expat=true
            skia_enable_skshaper=true
            skia_enable_skunicode=true
            skia_pdf_subset_harfbuzz=true
            skia_enable_pdf=true
            skia_compile_modules=false
            skia_enable_ganesh=false
            skia_lex=false
            extra_cflags=["-fPIC", "-fno-rtti"]'
            
          if [[ "${{ matrix.runtime.name }}" == linux-* ]]; then
            COMMON_ARGS+=' cc="clang" cxx="clang++"'
          fi
          
          if [ "${{ runner.os }}" = "macOS" ]; then
            COMMON_ARGS+=' skia_use_fonthost_mac=true'
          fi
          
          if [ "${{ matrix.runtime.name }}" = "win-x86" ]; then
            COMMON_ARGS+=' target_cpu="x86"'
          fi
          
          if [ "${{ matrix.runtime.name }}" = "linux-musl-x64" ]; then
            gn gen out/release --args="$COMMON_ARGS"
          else
            bin/gn gen out/release --args="$COMMON_ARGS"
          fi
          
          ninja -C out/release skia svg skparagraph skresources

          
      - name: Configure CMake
        shell: bash
        run: |
          CMAKE_ARGS="
            -S ${PWD}/native 
            -B ${PWD}/native/build 
            -DSKIA_DIR=${PWD}/skia 
            -DCMAKE_CXX_COMPILER=clang++ 
            -DCMAKE_C_COMPILER=clang 
            -DCMAKE_BUILD_TYPE=Release"
          if [ "${{ matrix.runtime.name }}" = "win-x86" ]; then
            CMAKE_ARGS+=" -A Win32"
          fi
          
          cmake $CMAKE_ARGS

          
      - name: Build CMake
        shell: bash
        run: >
          cmake 
          --build ${PWD}/native/build 
          --config Release

          
      - name: Copy build artifact to output directory
        shell: bash
        run: |
          mkdir -p output/runtimes/${{ matrix.runtime.name }}/native
          find native/build -type f \( -name "*.dylib" -o -name "*.dll" -o -name "*.so" \) -exec cp {} output/runtimes/${{ matrix.runtime.name }}/native \;

          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: questpdf-native-libraries-${{ matrix.runtime.name }}
          path: output
            

      - name: Setup .NET 6.0 SDK (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: pwsh
        run: |
          $arch = "${{ matrix.runtime.name }}".Replace("win-", "")
      
          $script = "$env:RUNNER_TEMP\dotnet-install.ps1"
          $installDir = "$env:RUNNER_TEMP\dotnet-$arch"
      
          Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile $script
          & $script -Channel 6.0 -Architecture $arch -InstallDir $installDir
      
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          Add-Content -Path $env:GITHUB_ENV -Value "DOTNET_ROOT=$installDir"

      
      - name: Setup .NET 6.0 SDK (Unix)
        if: startsWith(matrix.runtime.name, 'win-') == false
        shell: bash
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          INSTALL_DIR="$HOME/.dotnet"
          bash /tmp/dotnet-install.sh --channel 6.0 --install-dir "$INSTALL_DIR"
          echo "$INSTALL_DIR" >> $GITHUB_PATH
          echo "DOTNET_ROOT=$INSTALL_DIR" >> $GITHUB_ENV

          
      - name: Test build artifacts
        shell: bash
        run: |
          TEST_EXECUTION_PATH='managed/NativeSkia.Tests/bin/Debug/net8.0/${{ matrix.runtime.name }}'
          mkdir -p "$TEST_EXECUTION_PATH"
          cp -R output/* "$TEST_EXECUTION_PATH"
          
          dotnet test managed --framework net8.0 --runtime ${{ matrix.runtime.name }} || TEST_RESULT=$?
          mkdir -p testOutput/${{ matrix.runtime.name }} 
          
          ls -lR $TEST_EXECUTION_PATH
          cp -r $TEST_EXECUTION_PATH/Output/* testOutput/${{ matrix.runtime.name }}

          exit ${TEST_RESULT:-0}

          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: questpdf-test-results-${{ matrix.runtime.name }}
          path: testOutput

  merge:
    runs-on: ubuntu-latest
    needs: main
    if: ${{ always() }}
    steps:
      - name: Merge native libraries
        uses: actions/upload-artifact/merge@v4
        with:
          name: questpdf-native-libraries
          pattern: questpdf-native-libraries-*
          delete-merged: true


      - name: Merge test results
        uses: actions/upload-artifact/merge@v4
        with:
          name: questpdf-test-results
          pattern: questpdf-test-results-*
          delete-merged: true
